name: Gandiv Auto Trade Bot

on:
  schedule:
    - cron: '0 4 * * 1-5'
    - cron: '0 5 * * 1-5'
    - cron: '0 6 * * 1-5'
    - cron: '0 7 * * 1-5'
    - cron: '0 8 * * 1-5'
    - cron: '0 9 * * 1-5'
    - cron: '45 9 * * 1-5'
  workflow_dispatch:

concurrency:
  group: gandiv-auto-trade
  cancel-in-progress: false

jobs:
  auto-trade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Run Auto Trade Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python auto_trade_bot.py

      - name: Commit and push updated data
        run: |
          git config --global user.name "Auto Trade Bot"
          git config --global user.email "actions@github.com"
          git add gandiv_data.json
          git diff-index --quiet HEAD || git commit -m "Auto trade run: $(date)"
          git push origin HEAD --force
          
