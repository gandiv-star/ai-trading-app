name: Gandiv Auto Trade Bot

on:
  schedule:
    - cron: '0 4 * * 1-5'    # 9:30 AM IST
    - cron: '0 5 * * 1-5'    # 10:30 AM IST
    - cron: '0 6 * * 1-5'    # 11:30 AM IST
    - cron: '0 7 * * 1-5'    # 12:30 PM IST
    - cron: '0 8 * * 1-5'    # 1:30 PM IST
    - cron: '0 9 * * 1-5'    # 2:30 PM IST
    - cron: '45 9 * * 1-5'   # 3:15 PM IST
  workflow_dispatch:

jobs:
  auto-trade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance

      - name: Run Auto Trade Bot
        run: python auto_trade_bot.py

      - name: Commit and push updated data
        run: |
          git config --global user.name "Auto Trade Bot"
          git config --global user.email "actions@github.com"
          git add gandiv_data.json
          git diff --quiet --cached || git commit -m "Auto trade run: $(date)"
          git pull --rebase origin main
          git push
