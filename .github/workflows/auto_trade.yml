name: Gandiv Auto Trade Bot

on:
  schedule:
    - cron: '45 3 * * 1-5'   # 9:15 AM IST (market open)
    - cron: '15 4 * * 1-5'   # 9:45 AM IST
    - cron: '30 5 * * 1-5'   # 11:00 AM IST
    - cron: '0 7 * * 1-5'    # 12:30 PM IST
    - cron: '30 8 * * 1-5'   # 2:00 PM IST
    - cron: '45 9 * * 1-5'   # 3:15 PM IST (market close)
  workflow_dispatch:

concurrency:
  group: gandiv-auto-trade
  cancel-in-progress: false

jobs:
  auto-trade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance

      - name: Run Auto Trade Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python auto_trade_bot.py

      - name: Commit and push updated data
        run: |
          git config --global user.name "Auto Trade Bot"
          git config --global user.email "actions@github.com"
          git fetch origin main
          git reset --soft origin/main
          git add gandiv_data.json
          git diff --quiet --cached || git commit -m "Auto trade run"
          git push origin HEAD:main
